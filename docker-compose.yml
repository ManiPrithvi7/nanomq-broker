# Local stack: NanoMQ (private) + Caddy L4 passthrough on host :8883.
# Production Railway deploy uses two separate services — see README.md.
#
# Quick start:
#   ./generate-broker-cert-openssl.sh   # if certs/ not populated
#   docker compose up --build
#   openssl s_client -connect localhost:8883 -servername broker.withproof.io ...

services:
  nanomq-broker:
    build: .
    container_name: nanomq-broker
    restart: unless-stopped
    environment:
      NANOMQ_LOG_LEVEL: ${NANOMQ_LOG_LEVEL:-info}
      NANOMQ_DEBUG_CERTS: ${NANOMQ_DEBUG_CERTS:-}
      # Optional: set all three in .env to use env PEMs instead of volume mounts
      NANOMQ_TLS_CA_CERT: ${NANOMQ_TLS_CA_CERT:-}
      NANOMQ_TLS_CERT: ${NANOMQ_TLS_CERT:-}
      NANOMQ_TLS_KEY: ${NANOMQ_TLS_KEY:-}
    volumes:
      - ./certs/broker.crt:/etc/nanomq/certs/broker.crt:ro
      - ./certs/broker.key:/etc/nanomq/certs/broker.key:ro
      - ${ROOT_CA_CRT:-../statsmqtt/data/ca/root-ca.crt}:/etc/nanomq/certs/root_ca.crt:ro
    networks:
      - mqtt-net
    # No host ports — only caddy-proxy is exposed publicly.

  caddy-proxy:
    build: ./caddy-proxy
    container_name: caddy-proxy
    restart: unless-stopped
    environment:
      PORT: "8883"
      BROKER_INTERNAL_HOST: nanomq-broker
      BROKER_INTERNAL_PORT: "8883"
    ports:
      - "8883:8883"
    depends_on:
      - nanomq-broker
    networks:
      - mqtt-net

networks:
  mqtt-net:
    driver: bridge
