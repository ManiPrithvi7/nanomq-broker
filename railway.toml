# NanoMQ broker only — deploy as its own Railway service (e.g. nanomq-broker-private).
# Railway → New Service → same GitHub repo → Settings → Root Directory = . (repo root)
# Deploy method: Dockerfile only — do NOT use docker-compose.yml on Railway for production.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
