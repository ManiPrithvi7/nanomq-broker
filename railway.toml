# NanoMQ broker only — deploy as its own Railway service.
# Railway → New Service → same GitHub repo → Settings → Root Directory = nanomq-broker
# Config-as-code: this file (default railway.toml in that directory).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
