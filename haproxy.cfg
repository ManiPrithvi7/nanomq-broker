global
    log stdout local0
    maxconn 4096

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend mqtt_mtls
    bind *:8883 ssl \
        crt /etc/nanomq/certs/broker.pem \
        ca-file /etc/nanomq/certs/root_ca.crt \
        verify required \
        no-sslv3 no-tlsv10 no-tlsv11
    
    # Optional: log client cert CN for debugging
    tcp-request inspect-delay 5s
    
    default_backend nanomq_plain

backend nanomq_plain
    server nanomq_local 127.0.0.1:1883 check