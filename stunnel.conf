; stunnel.conf — mTLS termination, forward plain MQTT to NanoMQ
pid = /var/run/stunnel.pid
foreground = yes

[mqtts]
accept = 0.0.0.0:8883
connect = 127.0.0.1:1883

; Server cert + key
cert = /etc/nanomq/certs/broker.crt
key = /etc/nanomq/certs/broker.key

; Client CA for mTLS verification
CAfile = /etc/nanomq/certs/root_ca.crt
verifyPeer = yes
verifyChain = yes