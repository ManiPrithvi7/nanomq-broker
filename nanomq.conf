# NanoMQ 0.24.x — mTLS on 8883
# PEMs mounted at runtime by entrypoint from env vars

listeners.ssl {
  bind                 = "0.0.0.0:8883"
  keyfile              = "/etc/nanomq/certs/broker.key"
  certfile             = "/etc/nanomq/certs/broker.crt"
  cacertfile           = "/etc/nanomq/certs/root_ca.crt"
  verify_peer          = true
  fail_if_no_peer_cert = true
}

listeners.tcp {
  bind = "0.0.0.0:1883"
}

http_server {
  port = 8081
}

log {
  level = warn
  to    = [console]
}