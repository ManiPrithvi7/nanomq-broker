# NanoMQ 0.24.13 — OCI VPS (native mTLS). Docker/Railway may use stunnel + nanomq.plain.conf instead.
listeners.tcp {
  bind = "127.0.0.1:1883"
}

listeners.ssl {
  bind                 = "0.0.0.0:8883"
  keyfile              = "/etc/nanomq/certs/broker.key"
  certfile             = "/etc/nanomq/certs/broker.crt"
  cacertfile           = "/etc/nanomq/certs/root_ca.crt"
  verify_peer          = true
  fail_if_no_peer_cert = true
}

listeners.ws {
  enable = false
}

http_server {
  enable = false
}

log {
  level = warn
  to    = [console]
}
