# NanoMQ 0.24.x — mTLS on 8883; mount PEMs under /etc/nanomq/certs/
#
# Broker cert: CN=PROOF-nanomq-broker + SANs — generate with ./generate-broker-cert-openssl.sh
# (optional BROKER_SAN_IPS for raw-IP clients; x509 cannot match "any" IP).
# Clients via TCP proxy: MQTT_TLS_SERVERNAME=PROOF-nanomq-broker or MQTT_TLS_VERIFY_HOST (alias).
# cacertfile = CA that signs client certs (mTLS), same PKI as devices.

listeners.ssl {
  enable               = true
  bind                 = "0.0.0.0:8883"
  keyfile              = "/etc/nanomq/certs/broker.key"
  certfile             = "/etc/nanomq/certs/broker.crt"
  cacertfile           = "/etc/nanomq/certs/root_ca.crt"
  verify_peer          = true
  fail_if_no_peer_cert = true
}

listeners.tcp {
  enable = false
}

listeners.ws {
  enable = false
}

http_server {
  enable = false
}

log {
  level = warn
  to    = [console]
}
